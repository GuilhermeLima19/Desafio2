<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Desafio Cosmos</title>
    <link rel="stylesheet" href="desafio2.css">
</head>

<body>

    <div class="main-login"> 

        <div class="left-login">
            <h1>Faça login <br> E viaje pelo cosmos</h1> 
            <img src="astronaut-suit-animate.svg"left-login-image" alt="Astronauta flutuando no espaço"> 
        </div>

        <div class="right-login"> 
            <div class="card-login">
                <h1>Login</h1> 
                
                <div class="textfield"> 
                    <label for="usuario">Usuário</label> 
                    <input type="text" name="usuario" placeholder="Logue com seu Usuário">
                </div>
                
                <div class="textfield"> 
                    <label for="senha">Senha</label>
                    <input type="password" name="senha" placeholder="Insira sua senha"> 
                </div>
                
                <button class="btn-login">Embarcar</button> 
            </div>
        </div>
        
        <div class="rodape"> 
            <footer> 
                Guilherme &copy; 2026 - Todos os direitos reservados
            </footer>
        </div>
        
    </div>

</body>
</html>
